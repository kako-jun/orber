name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cargo test --verbose

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Run clippy
        run: cargo clippy -- -D warnings

  gpu-parity:
    name: GPU parity (lavapipe)
    # Pinned to 22.04: on the ubuntu-24.04 runner the apt mesa lavapipe ICD is
    # rejected by the stock Vulkan loader (vkCreateInstance -> ERROR_INCOMPATIBLE_DRIVER),
    # so request_adapter() returns nothing. 22.04 ships a loader/mesa pair that brings
    # lavapipe up out of the box, which is what GPU-testing Rust projects rely on.
    runs-on: ubuntu-22.04
    # The default CI 'test'/'clippy' jobs build WITHOUT --features gpu, so gpu.rs /
    # orb_circle.wgsl are never compiled, linted, or parity-checked there. This job
    # is the only place the wgpu path is exercised: it brings up Mesa's lavapipe
    # software Vulkan so request_adapter() actually succeeds on a GPU-less runner,
    # and ORBER_REQUIRE_GPU=1 turns "no adapter" into a hard test failure instead of
    # a silent skip (so the parity asserts must really run).
    env:
      # lavapipe (LLVMpipe Vulkan) ICD installed by mesa-vulkan-drivers.
      VK_ICD_FILENAMES: /usr/share/vulkan/icd.d/lvp_icd.x86_64.json
      # Fail (don't skip) the parity tests if no adapter comes up.
      ORBER_REQUIRE_GPU: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install Mesa software Vulkan (lavapipe)
        run: |
          sudo apt-get update
          sudo apt-get install -y mesa-vulkan-drivers vulkan-tools libvulkan1
          # Diagnostics (non-fatal): prove the ICD the loader is pinned to exists and
          # that an adapter actually comes up. If these are wrong, ORBER_REQUIRE_GPU=1
          # still turns it into a hard FAIL in the parity step below — these prints
          # just make the *reason* obvious in the log.
          echo "== ICD manifests ==" ; ls -la /usr/share/vulkan/icd.d/ || true
          echo "== loader / mesa versions ==" ; dpkg -l | grep -iE "libvulkan1|mesa-vulkan" || true
          echo "== vulkaninfo ==" ; vulkaninfo --summary || true

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Build orber-core with gpu feature
        run: cargo build -p orber-core --features gpu

      - name: Clippy (gpu feature, all targets)
        run: cargo clippy --workspace --all-targets --features gpu -- -D warnings

      - name: Run GPU parity tests (lavapipe, must not skip)
        # Run multi-threaded (the cargo default) on purpose: the parity tests share
        # one wgpu context via OnceLock (no adapter/device bring-up race), and
        # `GpuRenderer::render_packed` now serializes its whole GPU body under an
        # internal `render_guard`, so concurrent `render_frame` on the shared
        # renderer can no longer alias the shared orb texture / sized resources
        # (#210). Keeping the run parallel is deliberate: it lets CI detect any
        # regression of that data race (which `--test-threads=1` would have hidden).
        run: cargo test -p orber-core --features gpu -- --nocapture

  wasm:
    name: WASM build
    # wgpu 一重化 (#207) で wasm の健全性が重要になったため、wasm32 ターゲットの
    # orber-wasm が常時ビルド可能かを CI で検証する (#194)。
    # #230 以降、orber-wasm は wasm32 専用 target dependency で gpu 経路
    # （orber-core gpu feature + wgpu + web-sys）を常時引くため、この job の
    # ビルドは自動的に gpu 込みになる（フラグ追加は不要）。
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Build orber-wasm for wasm32
        run: cargo build --target wasm32-unknown-unknown -p orber-wasm

      - name: Clippy orber-wasm (wasm32)
        # #230: src/gpu.rs（WebGPU canvas present 経路）は wasm32 専用 cfg で、
        # native の clippy job ではコンパイルすらされない。lint 漏れを防ぐため
        # wasm32 ターゲットでも clippy を回す。
        run: cargo clippy --target wasm32-unknown-unknown -p orber-wasm -- -D warnings

      - name: Build orber-core (gpu feature) for wasm32
        # #229: core の GpuRenderer は wasm32 でもビルド可能を維持する（wgpu の
        # webgpu バックエンド・new_async・*_to_view 経路）。readback 系 /
        # pollster は native 専用 cfg に閉じているので、この step が通る =
        # wasm から見える gpu API が壊れていないことの検証になる。
        run: cargo build --target wasm32-unknown-unknown -p orber-core --features gpu

  web-test:
    name: Web test
    # web に導入済みの vitest を CI で走らせる (#165)。strings / glyph SDF /
    # encoder ロジック等の純粋 TS テストのみで、生成 wasm pkg はロードしない
    # (worker は test 側で mock される) ため wasm ビルド step は前置しない。
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Run vitest
        run: npm test
        working-directory: web
