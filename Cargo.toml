[package]
name = "orber"
version = "0.1.0"
edition = "2021"
authors = ["kako-jun"]
license = "MIT"
description = "Turn photos and videos into abstract orb mood images and short-form vertical videos"
homepage = "https://github.com/kako-jun/orber"
repository = "https://github.com/kako-jun/orber"
documentation = "https://docs.rs/orber"
readme = "README.md"
keywords = ["image", "video", "abstract", "orb", "mood"]
categories = ["command-line-utilities", "graphics", "multimedia"]
exclude = [".github/", "target/"]
rust-version = "1.78.0"

[dependencies]
clap = { version = "4.5", features = ["derive"] }
image = "0.25"
kmeans_colors = { version = "0.7", default-features = false, features = ["palette_color"] }
palette = "0.7"
rand = "0.8"
rand_chacha = "0.3"
tiny-skia = "0.11"

[dev-dependencies]

[profile.release]
lto = true
codegen-units = 1
panic = "abort"
