[workspace]
resolver = "2"
members = ["crates/core", "crates/cli"]

[workspace.package]
version = "0.3.0"
edition = "2021"
authors = ["kako-jun"]
license = "MIT"
homepage = "https://github.com/kako-jun/orber"
repository = "https://github.com/kako-jun/orber"
rust-version = "1.78.0"

[workspace.dependencies]
kmeans_colors = { version = "0.7", default-features = false, features = ["palette_color"] }
palette = "0.7"
rand = "0.8"
rand_chacha = "0.3"
thiserror = "1"
tiny-skia = "0.11"
clap = { version = "4.5", features = ["derive"] }
tempfile = "3"

[profile.release]
lto = true
codegen-units = 1
panic = "abort"
