<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>orber-wasm demo</title>
  <style>
    body { font-family: sans-serif; margin: 16px; background: #111; color: #ddd; }
    #out img { max-width: 200px; margin: 4px; vertical-align: top; }
  </style>
</head>
<body>
  <h1>orber-wasm demo</h1>
  <p>Pick an image. The wasm module will run kmeans + orb rendering and emit 4 PNG variations.</p>
  <input type="file" id="file" accept="image/*">
  <div id="out"></div>
  <script type="module">
    import init, { generate_batch } from './pkg/orber_wasm.js';
    await init();

    document.getElementById('file').addEventListener('change', async (ev) => {
      const file = ev.target.files[0];
      if (!file) return;
      const bitmap = await createImageBitmap(file);
      // OffscreenCanvas を避けて通常 canvas を使う（古い Safari 互換）。
      const canvas = document.createElement('canvas');
      canvas.width = bitmap.width;
      canvas.height = bitmap.height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(bitmap, 0, 0);
      const imgData = ctx.getImageData(0, 0, bitmap.width, bitmap.height);
      // Convert RGBA → RGB
      const rgb = new Uint8Array(bitmap.width * bitmap.height * 3);
      for (let i = 0, j = 0; i < imgData.data.length; i += 4, j += 3) {
        rgb[j] = imgData.data[i];
        rgb[j+1] = imgData.data[i+1];
        rgb[j+2] = imgData.data[i+2];
      }
      const params = {
        // serde-wasm-bindgen は Uint8Array をそのまま Vec<u8> に解釈するので
        // Array.from せずに渡すことでコピー回数を減らせる。
        source_rgb: rgb,
        source_width: bitmap.width,
        source_height: bitmap.height,
        k: 5,
        width: 540,
        height: 960,
        seed: 42,
        direction: 'lr',
        speed: 'slow',
        count: 20,
        orb_size: 3.0,
        blur: 0.5,
        shape: 'circle',
      };
      const pngs = generate_batch(params, 4);
      const out = document.getElementById('out');
      out.innerHTML = '';
      pngs.forEach((png) => {
        const blob = new Blob([png], { type: 'image/png' });
        const url = URL.createObjectURL(blob);
        const img = document.createElement('img');
        img.src = url;
        out.appendChild(img);
      });
    });
  </script>
</body>
</html>
